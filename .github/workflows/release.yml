name: Build and Release Arnis

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      TARGET: x86_64-pc-windows-msvc
      BINARY_NAME: arnis.exe
      ASSET_NAME: arnis-windows.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ env.TARGET }}

      - name: Install dependencies
        run: cargo fetch

      - name: Build
        run: cargo build --release --target ${{ env.TARGET }}

      - name: Prepare Windows executable
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path target\release | Out-Null
          Move-Item -LiteralPath "target\${env:TARGET}\release\${env:BINARY_NAME}" -Destination "target\release\${env:ASSET_NAME}" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: target/release/${{ env.ASSET_NAME }}

  release:
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows build artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-build
          path: ./builds/windows

      - name: Upload asset to tag release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: builds/windows/arnis-windows.exe
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create workflow-dispatch prerelease
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-${{ github.ref_name }}-${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          name: Windows build (${{ github.ref_name }}) #${{ github.run_number }}
          prerelease: true
          body: |
            Automated Windows build from `${{ github.ref_name }}`.

            Commit: `${{ github.sha }}`
          files: builds/windows/arnis-windows.exe
        env:
          GITHUB_TOKEN: ${{ github.token }}
